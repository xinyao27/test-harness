$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/locales.schema.yaml
title: Harness Locales v1
type: object
additionalProperties: false
required:
  - apiVersion
  - sourceLocale
  - requiredLocales
  - executionLocale
properties:
  apiVersion:
    const: 1
  sourceLocale:
    $ref: "#/$defs/locale"
  requiredLocales:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/locale"
  executionLocale:
    $ref: "#/$defs/locale"
$defs:
  locale:
    type: string
    pattern: "^[a-z]{2,3}(?:-[A-Z][A-Za-z0-9]*)?$"
