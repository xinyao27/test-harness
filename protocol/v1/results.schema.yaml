$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/results.schema.yaml
title: Harness Results v1
type: object
additionalProperties: false
required:
  - apiVersion
  - generatedAt
  - results
properties:
  apiVersion:
    const: 1
  generatedAt:
    type: string
  results:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - file
        - promiseId
        - status
        - testName
      properties:
        file:
          type: string
        promiseId:
          type: string
        status:
          enum: [passing, failing, skipped]
        testName:
          type: string
        failureMessage:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
            minLength: 1
          propertyNames:
            minLength: 1
