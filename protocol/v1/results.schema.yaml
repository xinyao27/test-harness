$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/results.schema.yaml
title: Harness Cucumber Results v1
type: object
additionalProperties: false
required:
  - apiVersion
  - generatedAt
  - results
properties:
  apiVersion:
    const: 1
  generatedAt:
    type: string
    minLength: 1
  results:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/exampleResult"
$defs:
  behaviorTag:
    type: string
    pattern: "^@(feature|rule|example):[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$"
  locale:
    type: string
    pattern: "^[a-z]{2,3}(?:-[A-Z][A-Za-z0-9]*)?$"
  status:
    enum: [passing, failing, skipped]
  stepResult:
    type: object
    additionalProperties: false
    required:
      - keyword
      - text
      - status
    properties:
      keyword:
        enum: [Given, When, Then, And, But]
      text:
        type: string
        minLength: 1
      status:
        $ref: "#/$defs/status"
      failureMessage:
        type: string
        minLength: 1
  exampleResult:
    type: object
    additionalProperties: false
    required:
      - feature
      - rule
      - example
      - locale
      - name
      - file
      - status
      - steps
    properties:
      feature:
        $ref: "#/$defs/behaviorTag"
      rule:
        $ref: "#/$defs/behaviorTag"
      example:
        $ref: "#/$defs/behaviorTag"
      locale:
        $ref: "#/$defs/locale"
      name:
        type: string
        minLength: 1
      file:
        type: string
        minLength: 1
      line:
        type: integer
        minimum: 1
      status:
        $ref: "#/$defs/status"
      steps:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/stepResult"
      failureMessage:
        type: string
        minLength: 1
      labels:
        type: object
        additionalProperties:
          type: string
          minLength: 1
        propertyNames:
          minLength: 1
