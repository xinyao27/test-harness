$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/promise.schema.yaml
title: Harness Promise v1
type: object
additionalProperties: false
required:
  - id
  - feature
  - title
  - purpose
  - priority
  - boundary
  - lifecycle
  - given
  - when
  - then
  - observes
  - failureMeaning
  - review
properties:
  id:
    type: string
    pattern: ^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$
  feature:
    type: string
  title:
    $ref: "#/$defs/localizedText"
  purpose:
    $ref: "#/$defs/localizedText"
  priority:
    enum: [P0, P1, P2]
  boundary:
    enum: [unit, integration, browser, e2e, adapter]
  lifecycle:
    enum: [proposed, accepted, implemented, changed_requires_review, deprecated]
  given:
    $ref: "#/$defs/localizedTextArray"
  when:
    $ref: "#/$defs/localizedTextArray"
  then:
    $ref: "#/$defs/localizedTextArray"
  observes:
    type: array
    items:
      type: string
    minItems: 1
  failureMeaning:
    $ref: "#/$defs/localizedText"
  review:
    type: object
    additionalProperties: false
    required:
      - state
      - events
    properties:
      state:
        enum: [pending, approved, changes_requested, rejected]
      decidedBy:
        type: string
      decidedAt:
        type: string
      note:
        type: string
      contentHash:
        type: string
        description: >
          Deterministic sha256 (`sha256:<hex>`) of the reviewable content fields
          (title, purpose, priority, boundary, given, when, then, observes,
          failureMeaning, examples) at the moment the review was approved.
          `harness check` compares the stored value against the current content
          and emits `accepted_promise_content_drifted` on mismatch. Absent for
          promises approved before this field existed; absence is treated as
          "drift undetectable", not "drift confirmed".
      events:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - action
            - by
            - at
          properties:
            action:
              enum: [approved, changes_requested, rejected]
            by:
              type: string
            at:
              type: string
            note:
              type: string
  supersedes:
    type: array
    items:
      type: string
  deprecatedBy:
    type: string
  examples:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - name
      properties:
        name:
          type: string
      additionalProperties:
        type: string
$defs:
  localizedText:
    oneOf:
      - type: string
      - type: object
        additionalProperties:
          type: string
  localizedTextArray:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/localizedText"
