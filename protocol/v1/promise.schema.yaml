$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/promise.schema.yaml
title: Harness Promise v1
type: object
additionalProperties: false
required:
  - apiVersion
  - id
  - feature
  - title
  - purpose
  - priority
  - boundary
  - lifecycle
  - given
  - when
  - then
  - observes
  - failureMeaning
  - review
properties:
  apiVersion:
    const: 1
  id:
    type: string
    pattern: ^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$
  feature:
    type: string
  title:
    $ref: "#/$defs/localizedText"
  purpose:
    $ref: "#/$defs/localizedText"
  priority:
    enum: [P0, P1, P2]
  boundary:
    enum: [unit, integration, browser, e2e, adapter]
  lifecycle:
    enum: [proposed, accepted, implemented, changed_requires_review, deprecated]
  given:
    $ref: "#/$defs/localizedTextArray"
  when:
    $ref: "#/$defs/localizedTextArray"
  then:
    $ref: "#/$defs/localizedTextArray"
  observes:
    type: array
    items:
      type: string
    minItems: 1
  failureMeaning:
    $ref: "#/$defs/localizedText"
  review:
    type: object
    additionalProperties: false
    properties:
      approvedAt:
        type: string
      approvedBy:
        type: string
      approvedIn:
        type: string
      notes:
        type: string
  supersedes:
    type: array
    items:
      type: string
  deprecatedBy:
    type: string
$defs:
  localizedText:
    oneOf:
      - type: string
      - type: object
        additionalProperties:
          type: string
  localizedTextArray:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/localizedText"
