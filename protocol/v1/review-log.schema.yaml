$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/review-log.schema.yaml
title: Harness Review Log v1
type: object
additionalProperties: false
required:
  - apiVersion
  - events
properties:
  apiVersion:
    const: 1
  events:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, at, by, action, summary, affectedRules]
      properties:
        id:
          type: string
          pattern: "^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$"
        at:
          type: string
          minLength: 1
        by:
          type: string
          minLength: 1
        action:
          enum: [proposed, accepted, changes_requested, rejected, deprecated, superseded]
        summary:
          $ref: "#/$defs/localizedText"
        affectedRules:
          type: array
          minItems: 1
          items:
            type: string
            pattern: "^@rule:[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$"
        note:
          $ref: "#/$defs/localizedText"
$defs:
  localizedText:
    anyOf:
      - type: string
        minLength: 1
      - type: object
        minProperties: 1
        additionalProperties:
          type: string
          minLength: 1
        propertyNames:
          pattern: "^[a-z]{2,3}(?:-[A-Z][A-Za-z0-9]*)?$"
