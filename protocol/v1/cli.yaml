apiVersion: 1
kind: harness-cli-contract
commands:
  check:
    purpose: Validate Harness config, canonical promise YAML files, module YAML files (including module-level source-file coverage), and in-process scenario bindings.
    reads:
      - tests/harness.yaml
      - tests/promises/**/*.promises.yaml
      - tests/modules/**/*.module.yaml
      - crates/**
      - packages/**
      - protocol/**
    writes: []
  report:
    purpose: Render a human-readable report from canonical promises, modules, and optional result YAML.
    reads:
      - tests/harness.yaml
      - tests/promises/**/*.promises.yaml
      - tests/modules/**/*.module.yaml
      - crates/**
      - packages/**
      - protocol/**
      - .harness/results.yaml
    writes: []
  verify:
    purpose: Alias the report path for human verification.
    reads:
      - tests/harness.yaml
      - tests/promises/**/*.promises.yaml
      - tests/modules/**/*.module.yaml
      - crates/**
      - packages/**
      - protocol/**
      - .harness/results.yaml
    writes: []
  test:
    purpose: Run a configured adapter/runtime command, require Harness result YAML when the command succeeds, and render the report.
    reads:
      - tests/harness.yaml
      - tests/promises/**/*.promises.yaml
      - tests/modules/**/*.module.yaml
      - crates/**
      - packages/**
      - protocol/**
      - .harness/results.yaml
    writes:
      - .harness/runs/<run-id>/events/*.ndjson
      - .harness/results.yaml
environment:
  HARNESS_ROOT_DIR: The workspace root adapters and runtimes should use when writing Harness artifacts.
  HARNESS_RUN_ID: The run id adapters should attach to emitted adapter events.
  HARNESS_ADAPTER_EVENTS_DIR: The event shard directory adapters should use for the active run.
exitCodes:
  success: 0
  failure: 1
