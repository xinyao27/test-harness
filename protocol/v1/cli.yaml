apiVersion: 1
kind: harness-cli-contract
commands:
  check:
    purpose: Validate Harness config, canonical promise YAML files, module YAML files (including module-level source-file coverage), and in-process scenario bindings.
    reads:
      - harness.yaml
      - promises/**/*.promises.yaml
      - modules/**/*.module.yaml
      - packages/**
      - apps/**
      - protocol/**
    writes: []
  report:
    purpose: Render a human-readable report from canonical promises, modules, and optional result YAML.
    reads:
      - harness.yaml
      - promises/**/*.promises.yaml
      - modules/**/*.module.yaml
      - packages/**
      - apps/**
      - protocol/**
      - .harness/results.yaml
    writes: []
  verify:
    purpose: Alias the report path for human verification.
    reads:
      - harness.yaml
      - promises/**/*.promises.yaml
      - modules/**/*.module.yaml
      - packages/**
      - apps/**
      - protocol/**
      - .harness/results.yaml
    writes: []
  test:
    purpose: Run a configured adapter command, require Harness result YAML when the adapter succeeds, and render the report.
    reads:
      - harness.yaml
      - promises/**/*.promises.yaml
      - modules/**/*.module.yaml
      - packages/**
      - apps/**
      - protocol/**
      - .harness/results.yaml
    writes:
      - .harness/results.yaml
environment:
  HARNESS_ROOT_DIR: The workspace root adapters should use when writing .harness/results.yaml.
exitCodes:
  success: 0
  failure: 1
