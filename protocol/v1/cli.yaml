apiVersion: 1
kind: harness-cli-contract
commands:
  check:
    purpose: Validate Harness config, localized feature files, package/module manifests, and in-process feature bindings.
    reads:
      - tests/harness.yaml
      - tests/harness.packages.yaml
      - tests/harness.modules.yaml
      - tests/harness.behavior.yaml
      - tests/harness.review-log.yaml
      - tests/harness.locales.yaml
      - features/**/*.feature
      - crates/**
      - bridges/**
      - packages/**
      - protocol/**
    writes: []
  report:
    purpose: Render a human-readable report from feature metadata and optional result YAML.
    reads:
      - tests/harness.yaml
      - tests/harness.packages.yaml
      - tests/harness.modules.yaml
      - tests/harness.behavior.yaml
      - tests/harness.review-log.yaml
      - tests/harness.locales.yaml
      - features/**/*.feature
      - crates/**
      - bridges/**
      - packages/**
      - protocol/**
      - tests/harness.results.yaml
    writes: []
  verify:
    purpose: Alias the report path for human verification.
    reads:
      - tests/harness.yaml
      - tests/harness.packages.yaml
      - tests/harness.modules.yaml
      - tests/harness.behavior.yaml
      - tests/harness.review-log.yaml
      - tests/harness.locales.yaml
      - features/**/*.feature
      - crates/**
      - bridges/**
      - packages/**
      - protocol/**
      - tests/harness.results.yaml
    writes: []
  test:
    purpose: Run a configured bridge/runner command, require Harness result YAML when the command succeeds, and render the report.
    reads:
      - tests/harness.yaml
      - tests/harness.packages.yaml
      - tests/harness.modules.yaml
      - tests/harness.behavior.yaml
      - tests/harness.review-log.yaml
      - tests/harness.locales.yaml
      - features/**/*.feature
      - crates/**
      - bridges/**
      - packages/**
      - protocol/**
      - tests/harness.results.yaml
    writes:
      - .harness/runs/<run-id>/events/*.ndjson
      - tests/harness.results.yaml
environment:
  HARNESS_ROOT_DIR: The workspace root bridges and runners should use when writing Harness artifacts.
  HARNESS_RUN_ID: The run id bridges should attach to emitted bridge events.
  HARNESS_BRIDGE_EVENTS_DIR: The event shard directory bridges should use for the active run.
  HARNESS_CUCUMBER_TAG_EXPRESSION: The Cucumber tag expression generated from the selected Harness package/module/feature/rule/example/locale slice.
  HARNESS_RUNNER_PACKAGE: The selected package tag, when a package slice is requested.
  HARNESS_RUNNER_MODULE: The selected module tag, when a module slice is requested.
  HARNESS_RUNNER_FEATURE: The selected feature tag, when a feature slice is requested.
  HARNESS_RUNNER_RULE: The selected rule tag, when a rule slice is requested.
  HARNESS_RUNNER_EXAMPLE: The selected example tag, when an example slice is requested.
  HARNESS_RUNNER_LOCALE: The selected locale tag, when a locale slice is requested.
exitCodes:
  success: 0
  failure: 1
