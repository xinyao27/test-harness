$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/packages.schema.yaml
title: Harness Packages v1
type: object
additionalProperties: false
required:
  - apiVersion
  - packages
properties:
  apiVersion:
    const: 1
  packages:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, title, path, purpose, modules]
      properties:
        id:
          $ref: "#/$defs/id"
        title:
          $ref: "#/$defs/localizedText"
        path:
          type: string
          minLength: 1
        purpose:
          $ref: "#/$defs/localizedText"
        modules:
          type: array
          minItems: 1
          items:
            $ref: "#/$defs/id"
$defs:
  id:
    type: string
    pattern: "^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$"
  localizedText:
    anyOf:
      - type: string
        minLength: 1
      - type: object
        minProperties: 1
        additionalProperties:
          type: string
          minLength: 1
        propertyNames:
          pattern: "^[a-z]{2,3}(?:-[A-Z][A-Za-z0-9]*)?$"
