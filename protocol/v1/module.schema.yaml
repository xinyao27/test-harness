$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/module.schema.yaml
title: Harness Module v1
description: A canonical module file defines a reviewable architecture boundary, its owned promise ids, and the source paths it covers.
type: object
additionalProperties: false
required:
  - apiVersion
  - id
  - title
  - summary
  - purpose
  - promises
  - covers
properties:
  apiVersion:
    const: 1
  id:
    type: string
    pattern: ^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$
  title:
    description: Human-facing architecture name for this module.
    $ref: "#/$defs/localizedText"
  summary:
    description: Short explanation of the architectural responsibility this module owns.
    $ref: "#/$defs/localizedText"
  purpose:
    description: Why this architecture boundary matters to reviewers and future agents.
    $ref: "#/$defs/localizedText"
  promises:
    description: Promise ids owned by this architecture boundary.
    type: array
    minItems: 1
    items:
      type: string
      pattern: ^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$
  covers:
    description: Source paths that belong to this architecture boundary.
    type: array
    minItems: 1
    items:
      type: string
$defs:
  localizedText:
    oneOf:
      - type: string
      - type: object
        additionalProperties:
          type: string
