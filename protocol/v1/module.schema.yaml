$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/module.schema.yaml
title: Harness Module v1
description: A canonical module file defines a reviewable source area, its owned promise ids, and the source paths it covers.
type: object
additionalProperties: false
required:
  - apiVersion
  - id
  - title
  - summary
  - purpose
  - promises
  - covers
properties:
  apiVersion:
    const: 1
  id:
    type: string
    pattern: ^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$
  title:
    $ref: "#/$defs/localizedText"
  summary:
    $ref: "#/$defs/localizedText"
  purpose:
    $ref: "#/$defs/localizedText"
  promises:
    type: array
    minItems: 1
    items:
      type: string
      pattern: ^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$
  covers:
    type: array
    minItems: 1
    items:
      type: string
$defs:
  localizedText:
    oneOf:
      - type: string
      - type: object
        additionalProperties:
          type: string
