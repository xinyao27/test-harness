$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/modules.schema.yaml
title: Harness Modules v1
type: object
additionalProperties: false
required:
  - apiVersion
  - modules
properties:
  apiVersion:
    const: 1
  modules:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, package, title, purpose, covers]
      properties:
        id:
          $ref: "#/$defs/id"
        package:
          $ref: "#/$defs/id"
        title:
          $ref: "#/$defs/localizedText"
        purpose:
          $ref: "#/$defs/localizedText"
        covers:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
$defs:
  id:
    type: string
    pattern: "^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$"
  localizedText:
    anyOf:
      - type: string
        minLength: 1
      - type: object
        minProperties: 1
        additionalProperties:
          type: string
          minLength: 1
        propertyNames:
          pattern: "^[a-z]{2,3}(?:-[A-Z][A-Za-z0-9]*)?$"
