$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/behavior.schema.yaml
title: Harness Behavior State v1
type: object
additionalProperties: false
required:
  - apiVersion
  - rules
properties:
  apiVersion:
    const: 1
  rules:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [feature, rule, state, owner]
      properties:
        feature:
          type: string
          pattern: "^@feature:[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$"
        rule:
          type: string
          pattern: "^@rule:[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$"
        state:
          enum: [draft, proposed, accepted, changes_requested, rejected, deprecated, superseded]
        review:
          $ref: "#/$defs/review"
        owner:
          type: string
          pattern: "^[a-z][a-z0-9]*(?:[._-][a-z0-9]+)*$"
$defs:
  review:
    type: object
    additionalProperties: false
    properties:
      by:
        type: string
        minLength: 1
      at:
        type: string
        minLength: 1
      note:
        $ref: "#/$defs/localizedText"
  localizedText:
    anyOf:
      - type: string
        minLength: 1
      - type: object
        minProperties: 1
        additionalProperties:
          type: string
          minLength: 1
        propertyNames:
          pattern: "^[a-z]{2,3}(?:-[A-Z][A-Za-z0-9]*)?$"
