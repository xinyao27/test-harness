$schema: https://json-schema.org/draft/2020-12/schema
$id: https://test-harness.local/protocol/v1/report.schema.yaml
title: Harness Report v1
type: object
additionalProperties: false
required:
  - apiVersion
  - summary
  - features
  - issues
properties:
  apiVersion:
    const: 1
  summary:
    type: object
    additionalProperties: false
    required: [promises, errors, warnings]
    properties:
      promises:
        type: number
      errors:
        type: number
      warnings:
        type: number
  features:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [feature, promises]
      properties:
        feature:
          type: string
        promises:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - promiseId
              - title
              - purpose
              - priority
              - lifecycle
              - runStatus
              - given
              - when
              - then
              - evidence
              - failureMeaning
              - warnings
            properties:
              promiseId:
                type: string
              title:
                type: string
              purpose:
                type: string
              priority:
                enum: [P0, P1, P2]
              lifecycle:
                enum: [proposed, accepted, implemented, changed_requires_review, deprecated]
              runStatus:
                enum: [unknown, passing, failing, skipped, missing_evidence, evidence_drifted]
              given:
                type: array
                items:
                  type: string
              when:
                type: array
                items:
                  type: string
              then:
                type: array
                items:
                  type: string
              evidence:
                type: array
                items:
                  type: string
              failureMeaning:
                type: string
              warnings:
                type: array
                items:
                  $ref: "#/$defs/validationIssue"
  issues:
    type: array
    items:
      $ref: "#/$defs/validationIssue"
$defs:
  validationIssue:
    type: object
    additionalProperties: false
    required: [code, message, severity]
    properties:
      code:
        type: string
      message:
        type: string
      severity:
        enum: [error, warning]
      path:
        type: string
      promiseId:
        type: string
