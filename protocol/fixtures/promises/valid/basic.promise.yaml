id: harness.fixture.valid_basic_promise
feature: Harness Fixtures / Promise
title:
  en: Valid fixture promises decode through protocol v1
  zh-CN: 有效 fixture promises 会通过 protocol v1 解码
purpose:
  en: Provide a portable valid promise sample for conformance tests.
  zh-CN: 为 conformance tests 提供一个可移植的有效 promise sample。
priority: P1
boundary: unit
lifecycle: accepted
given:
  - en: A valid promise fixture exists
    zh-CN: 存在一个有效 promise fixture
when:
  - en: A Harness implementation decodes the fixture
    zh-CN: Harness 实现解码这个 fixture
then:
  - en: The fixture is accepted by protocol v1
    zh-CN: 该 fixture 会被 protocol v1 接受
observes:
  - protocol/fixtures/promises/valid/basic.promise.yaml
failureMeaning:
  en: Implementations may not agree on the valid promise shape.
  zh-CN: 不同实现可能无法就有效 promise shape 达成一致。
