apiVersion: 1
promises:
  - id: harness.fixture.invalid_promises_file_child
    feature: Harness Fixtures / Promise Files
    purpose:
      en: Provide an invalid child promise sample for conformance tests.
    priority: P1
    boundary: unit
    lifecycle: accepted
    given:
      - en: A promises file contains a child promise without a title
    when:
      - en: A Harness implementation decodes the fixture
    then:
      - en: The fixture is rejected by protocol v1
    observes:
      - protocol/fixtures/promise-files/invalid/invalid-child.promises.yaml
    failureMeaning:
      en: Implementations may accept invalid child promises inside a valid wrapper.
    review:
      approvedBy: xinyao
      approvedAt: "2026-05-24"
