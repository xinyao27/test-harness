apiVersion: 1
id: cli
title:
  en: CLI — human-facing harness commands
  zh-CN: CLI — 面向人类的 harness 命令
summary:
  en: The four commands a human actually runs — harness check (validate config and promise files), harness test (run the configured adapter and verify), harness report (full promise status), and harness report --summary (one-line-per-promise overview). This is the only surface most contributors will touch; the registry, schema, validation, and report modules are wired in behind these commands.
  zh-CN: 人类实际会运行的四条命令 — harness check（校验 config 和 promise 文件）、harness test（运行配置好的 adapter 并 verify）、harness report（完整 promise 状态）、harness report --summary（每条 promise 一行的概览）。大多数贡献者只会接触这一层；registry、schema、validation 和 report 模块都被组装在这些命令背后。
purpose:
  en: The CLI is the seed loop's user interface — if humans cannot get readable promise status without opening source files, the whole "review promises, not code" premise fails.
  zh-CN: CLI 是 seed loop 的用户界面 — 如果人类不打开源代码就拿不到可读的 promise status，那么"review promises，而不是 review code"这个前提就站不住脚。
promises:
  - harness.cli.check_validates_promises
  - harness.cli.rejects_invalid_arguments_with_usage_hint
  - harness.cli.report_renders_promise_status
  - harness.cli.report_summary_lists_promises_compactly
  - harness.cli.test_reads_runner_config
  - harness.cli.test_orchestrates_adapter_and_verify
covers:
  - crates/harness-cli/Cargo.toml
  - crates/harness-cli/src/**
  - crates/harness-core/src/config.rs
  - crates/harness-core/src/programs.rs
