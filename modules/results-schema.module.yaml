apiVersion: 1
id: results-schema
title:
  en: Results Schema — required-field shape for adapter result files
  zh-CN: Results Schema — adapter result files 的必填字段形状
summary:
  en: Decodes adapter result files (`.harness/results.yaml`) through the versioned protocol schema. Rejects files whose shape is not explicitly defined, so malformed results surface at load time instead of later during report rendering.
  zh-CN: 通过版本化 protocol schema 解码 adapter result files（`.harness/results.yaml`）。拒绝 protocol shape 没有被明确定义的文件，让畸形 results 在加载阶段就暴露，而不是在后续 report 渲染时才出现。
purpose:
  en: Distinct review audience from the adapter — this module owns the protocol-shape contract for adapter output, parallel to how `promise-schema` owns the contract for promise files.
  zh-CN: 与 adapter 的 review 受众不同 —— 这个模块负责 adapter output 的 protocol-shape 契约，与 `promise-schema` 负责 promise files 的契约平行。
promises:
  - harness.results.schema_defines_required_fields
covers:
  - packages/core/src/results.ts
