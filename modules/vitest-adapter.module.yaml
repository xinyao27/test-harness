apiVersion: 1
id: vitest-adapter
title:
  en: Vitest Adapter — binding tests and collecting results for Vitest
  zh-CN: Vitest Adapter — 在 Vitest 中绑定测试并收集结果
summary:
  en: The reference adapter for Vitest. Provides scenarioTest(promiseId, ...) so a Vitest test can stay attached to a canonical promise id, and a thin reporter that turns Vitest outcomes into language-neutral adapter events for the shared runtime to merge.
  zh-CN: Vitest 的参考 adapter。提供 scenarioTest(promiseId, ...) 让 Vitest 测试稳定绑定到 canonical promise id，并提供薄 reporter，把 Vitest 结果转换成语言无关的 adapter events，交给共享 runtime 合并。
purpose:
  en: Without an adapter, the harness has reviewed promises but no executable evidence — adapters are how runtime test outcomes become protocol-shaped results the rest of the harness can read.
  zh-CN: 没有 adapter，harness 就只有已 review 的 promises，没有可执行证据 — adapter 把运行时测试结果转成 harness 其它部分能读的 protocol 形态结果。
promises:
  - harness.adapters.vitest.result_collector.maps_results_to_promises
  - harness.adapters.vitest.result_collector.writes_results_to_explicit_harness_root
  - harness.adapters.vitest.scenario_helper.binds_tests_to_canonical_promises
covers:
  - packages/adapter-vitest/src/**
