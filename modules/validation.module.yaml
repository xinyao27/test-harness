apiVersion: 1
id: validation
title:
  en: Validation — readability and evidence-coverage checks
  zh-CN: Validation — 可读性与证据覆盖检查
summary:
  en: Runs human-facing checks against loaded promises and collected adapter results. Flags promise metadata that is too thin or malformed for a human to review reliably, and flags implemented promises that have no test result evidence after a run.
  zh-CN: 对加载到的 promises 和已收集的 adapter results 运行面向人类的检查。标记 metadata 过于稀薄或畸形、人类无法可靠 review 的 promise，标记运行后没有 test result 证据的 implemented promises。
purpose:
  en: Promise-first authoring depends on the reviewer being able to trust the metadata and on unproven implemented promises being visible — both rely on this module.
  zh-CN: Promise-first authoring 依赖 reviewer 能信任 metadata，也依赖未被证明的 implemented promises 是可见的 — 两者都靠这个模块。
promises:
  - harness.validation.flags_promises_without_test_results
  - harness.validation.rejects_unreadable_promises
