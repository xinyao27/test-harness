apiVersion: 1
kind: TodoBackendHarnessFeatureMap
source:
  modulesDirectory: modules
  promisesDirectory: promises
coverage:
  target: canonical-harness-modules-and-promises
  expectedModuleCount: 11
  expectedHarnessPromiseCount: 42
  description:
    en: Every canonical TestHarness module and module-owned promise must have an explicit application path in the Todo-Backend showcase.
    zh-CN: 每个 canonical TestHarness module 及其拥有的 promise，都必须在 Todo-Backend showcase 中拥有明确应用路径。
features:
  - moduleId: adapter-runtime
    harnessPromiseIds:
      - harness.adapter_runtime.collects_event_shards_into_results
      - harness.adapter_runtime.exposes_runner_for_non_cargo_users
      - harness.adapter_runtime.preserves_framework_independent_evidence
      - harness.adapter_runtime.uses_isolated_run_event_directories
    showcasePromiseIds:
      - todo_backend.showcase.cross_language_adapters_merge_evidence
      - todo_backend.showcase.one_command_runs_full_demo
    currentArtifacts:
      - examples/todo-backend/harness-feature-map.yaml
      - examples/todo-backend/harness.yaml
      - examples/todo-backend/promises/showcase.promises.yaml
      - examples/todo-backend/tools/check-feature-map.mjs
      - examples/todo-backend/tools/lib/processes.mjs
      - examples/todo-backend/tools/run-browser-e2e.mjs
      - examples/todo-backend/tools/run-harness-cli.mjs
      - examples/todo-backend/tools/run-rust-contract.mjs
      - examples/todo-backend/tools/run-todo-backend-suite.mjs
      - examples/todo-backend/tools/run-typescript-contract.mjs
      - examples/todo-backend/implementations/rust-axum
      - examples/todo-backend/implementations/typescript-hono
    plannedArtifacts:
      - examples/todo-backend/.harness/runs/*/events/*.ndjson
      - examples/todo-backend/.harness/results.yaml
    implementedCommands:
      - pnpm example:todo:check
      - pnpm example:todo:test
      - pnpm example:todo:test:browser:rust
      - pnpm example:todo:test:browser:typescript
      - pnpm example:todo:test:rust
      - pnpm example:todo:test:typescript
    plannedCommands: []

  - moduleId: cli
    harnessPromiseIds:
      - harness.cli.check_validates_promises
      - harness.cli.rejects_invalid_arguments_with_usage_hint
      - harness.cli.report_renders_promise_status
      - harness.cli.report_summary_lists_promises_compactly
      - harness.cli.test_reads_runner_config
      - harness.cli.test_orchestrates_adapter_and_verify
    showcasePromiseIds:
      - todo_backend.showcase.one_command_runs_full_demo
      - todo_backend.showcase.cli_reports_bilingual_promise_status
    currentArtifacts:
      - package.json
      - examples/todo-backend/harness.yaml
      - examples/todo-backend/README.md
      - examples/todo-backend/README.zh-CN.md
    plannedArtifacts: []
    implementedCommands:
      - pnpm example:todo:check
      - pnpm example:todo:test
      - pnpm example:todo:report
    plannedCommands: []

  - moduleId: module-registry
    harnessPromiseIds:
      - harness.module_registry.load_canonical_yaml_modules
    showcasePromiseIds:
      - todo_backend.showcase.feature_map_covers_harness_capabilities
      - todo_backend.showcase.validation_guards_promise_and_module_coverage
    currentArtifacts:
      - examples/todo-backend/modules/api-contract.module.yaml
      - examples/todo-backend/modules/client.module.yaml
      - examples/todo-backend/modules/rust-axum.module.yaml
      - examples/todo-backend/modules/showcase.module.yaml
      - examples/todo-backend/modules/typescript-hono.module.yaml
    plannedArtifacts: []
    implementedCommands:
      - pnpm example:todo-feature-map:check
    plannedCommands: []

  - moduleId: promise-registry
