      - harness.protocol.promise_files_are_versioned
      - harness.protocol.results_are_versioned_adapter_outputs
      - harness.protocol.runner_config_is_versioned
      - harness.protocol.schemas_define_language_agnostic_contract
    showcasePromiseIds:
