      - pnpm example:todo-feature-map:check
    plannedCommands: []

  - moduleId: promise-schema
    harnessPromiseIds:
      - harness.promise.schema_supports_example_variants
      - harness.promise.canonical_file_is_grouped
      - harness.promise.schema_defines_required_fields
    showcasePromiseIds:
