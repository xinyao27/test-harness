apiVersion: 1
promises:
  - id: harness.daemon.spawns_agent_pty_with_paired_env
    feature: Harness Daemon / Agent panel
    title:
      en: The daemon spawns an agent pty only for paired sessions and injects the paired daemon credentials into the child's environment
      zh-CN: Daemon 只为已配对的 session 启动 agent pty，并把已配对的 daemon 凭据注入子进程环境
    purpose:
      en: Make the Studio's Agent Panel a single-click experience — the daemon launches the agent CLI in a pty already wired up to the user's paired daemon session, so the agent can immediately use `harness …` without any extra setup; at the same time make sure this process-spawning endpoint cannot be reached by unauthenticated callers.
      zh-CN: 让 Studio 的 Agent Panel 是一键体验——daemon 在 pty 里启动 agent CLI 时，子进程已经接好用户的配对 session，agent 一开就能用 `harness …`，无需额外设置；同时确保这个会拉起进程的 endpoint 不能被未鉴权调用方触达。
    priority: P0
    boundary: integration
    lifecycle: accepted
    given:
      - en: A paired Studio session opens a WebSocket to /api/agent/pty
        zh-CN: 一个已配对的 Studio session 向 /api/agent/pty 打开 WebSocket
      - en: A second, unauthenticated client tries to do the same
        zh-CN: 另一个未鉴权的客户端尝试同样的连接
    when:
      - en: The daemon handles each connection
        zh-CN: Daemon 处理每个连接
    then:
      - en: The paired connection causes the daemon to spawn the configured agent CLI inside a pty, with HARNESS_DAEMON_URL and HARNESS_DAEMON_TOKEN in the child env set to the calling session's URL and token
        zh-CN: 已配对的连接会让 daemon 在 pty 里启动配置好的 agent CLI，子进程的 HARNESS_DAEMON_URL 和 HARNESS_DAEMON_TOKEN 指向调用方 session 的 URL 和 token
      - en: stdin/stdout/stderr of the pty are bridged to the WebSocket in both directions; resize events from the client are forwarded to the pty
        zh-CN: pty 的 stdin/stdout/stderr 双向桥到 WebSocket；客户端发来的 resize 事件转发到 pty
      - en: The unauthenticated connection is refused before any process is spawned
        zh-CN: 未鉴权的连接在 spawn 任何进程之前就被拒绝
      - en: When the WebSocket closes or the agent process exits, the daemon kills and reaps the child within a bounded time so the process does not become a zombie
        zh-CN: WebSocket 断开或 agent 进程退出时，daemon 在有限时间内 kill 并 reap 子进程，不留下 zombie
    observes:
      - crates/harness-daemon/src/main.rs
      - crates/harness-daemon/src/lib.rs
    failureMeaning:
      en: Either the Studio Agent Panel cannot actually run the agent (the loop is broken end to end), or pty connections can be opened by unauthenticated callers (a process-spawn endpoint with arbitrary env injection is a security hole), or zombie agent processes accumulate on every panel close.
      zh-CN: 要么 Studio Agent Panel 起不来 agent（端到端循环坏了），要么未鉴权调用方也能开 pty（带任意 env 注入的进程 spawn endpoint 是安全漏洞），要么每次关 panel 都留下 zombie agent 进程。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-28
      events:
        - action: approved
          by: xinyao
          at: 2026-05-28
