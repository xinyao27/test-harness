apiVersion: 1
promises:
  - id: harness.daemon.local_pairing_issues_revocable_session_tokens
    feature: Harness Daemon / Local Pairing
    title:
      en: The daemon pairs Studio through revocable local session tokens
      zh-CN: Daemon 通过可撤销的本地 session token 与 Studio 配对
    purpose:
      en: Let a deployed Web Studio control a local daemon without user accounts, server relay, cookies, or persistent shared secrets in the web app.
      zh-CN: 让部署后的 Web Studio 可以控制本地 daemon，同时不需要用户账号、server 中转、cookies，或在 web app 中保存长期共享密钥。
    priority: P0
    boundary: integration
    lifecycle: proposed
    given:
      - en: The local daemon is running on the user's machine
        zh-CN: 本地 daemon 正在用户机器上运行
      - en: Harness Studio opens without an existing valid local daemon session
        zh-CN: Harness Studio 打开时没有已有有效的本地 daemon session
    when:
      - en: The user completes the local pairing flow with a daemon-generated one-time code
        zh-CN: 用户使用 daemon 生成的一次性 code 完成本地 pairing flow
    then:
      - en: The daemon returns an opaque local session token scoped to the paired Studio client
        zh-CN: Daemon 返回一个 opaque local session token，并将它限制在完成配对的 Studio client 上
      - en: The daemon stores only a token hash, client metadata, allowed origins, allowed project roots, and expiry or revocation metadata
        zh-CN: Daemon 只保存 token hash、client metadata、allowed origins、allowed project roots，以及过期或撤销 metadata
      - en: Expired, revoked, unknown, or origin-mismatched tokens cannot read snapshots, stream events, run commands, or reach agent APIs
        zh-CN: 过期、已撤销、未知或 origin 不匹配的 token 不能读取 snapshot、stream events、运行命令或访问 agent APIs
      - en: Pairing does not require a login, hosted auth service, or daemon connection to a central server
        zh-CN: Pairing 不需要登录、hosted auth service，也不需要 daemon 连接到中心 server
    observes:
      - crates/harness-daemon/**
      - apps/web/src/lib/api.ts
      - apps/web/src/features/studio/**
      - docs/design/local-daemon-studio-connection.md
      - docs/design/local-daemon-studio-connection.zh-CN.md
    failureMeaning:
      en: Any webpage or stale local client could keep controlling the daemon, or Harness Studio would drift back into a login/server-mediated model.
      zh-CN: 任意网页或过期本地 client 都可能继续控制 daemon，或者 Harness Studio 会退回需要登录 / server 中转的模型。
    review: {}
