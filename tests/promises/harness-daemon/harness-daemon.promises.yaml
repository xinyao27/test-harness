apiVersion: 1
promises:
  - id: harness.daemon.snapshot_reads_canonical_project_files
    feature: Harness Daemon / Project Snapshot
    title:
      en: The daemon derives project snapshots from canonical Harness files
      zh-CN: Daemon 会从 canonical Harness files 推导 project snapshots
    purpose:
      en: Protect the protocol-first model by making Studio read modules, promises, and latest results from project files instead of a hand-maintained frontend snapshot.
      zh-CN: 通过让 Studio 从项目文件读取 modules、promises 和 latest results，而不是依赖手写前端 snapshot，保护 protocol-first 模型。
    priority: P0
    boundary: integration
    lifecycle: accepted
    given:
      - en: A Harness project contains tests/modules and tests/promises files
        zh-CN: 一个 Harness project 包含 tests/modules 和 tests/promises 文件
      - en: The project may contain a .harness/results.yaml file
        zh-CN: 该 project 可能包含 .harness/results.yaml 文件
    when:
      - en: The daemon builds a Studio project snapshot for that root
        zh-CN: Daemon 为该 root 构建 Studio project snapshot
    then:
      - en: The snapshot modules are loaded from tests/modules files
        zh-CN: Snapshot 中的 modules 来自 tests/modules files
      - en: The snapshot promises are loaded from tests/promises files
        zh-CN: Snapshot 中的 promises 来自 tests/promises files
      - en: Promise run statuses are derived from the latest Harness results when available
        zh-CN: 如果存在最新 Harness results，promise run status 会由这些结果推导出来
      - en: The daemon can rebuild the same meaningful view after its in-memory state is discarded
        zh-CN: Daemon 丢弃内存状态后仍然可以重建同样有意义的视图
    observes:
      - crates/harness-daemon/src/lib.rs
      - crates/harness-core/src/module_registry.rs
      - crates/harness-core/src/promise_registry.rs
      - crates/harness-core/src/results.rs
      - tests/modules/**/*.module.yaml
      - tests/promises/**/*.promises.yaml
    failureMeaning:
      en: Harness Studio would continue to show stale or hand-maintained project data, making the daemon a cosmetic switch instead of a trustworthy local read model.
      zh-CN: Harness Studio 会继续展示过期或手写维护的项目数据，让 daemon 变成表面切换，而不是可信的本地 read model。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-26
      events:
        - action: approved
          by: xinyao
          at: 2026-05-26

  - id: harness.daemon.http_snapshot_matches_studio_contract
    feature: Harness Daemon / Studio API
    title:
      en: The daemon exposes a Studio-compatible project snapshot endpoint
      zh-CN: Daemon 会暴露 Studio-compatible project snapshot endpoint
    purpose:
      en: Let Harness Studio replace static snapshots incrementally while preserving a safe fallback when the local daemon is not running.
      zh-CN: 让 Harness Studio 可以逐步替换静态 snapshot，同时在本地 daemon 未运行时保留安全 fallback。
    priority: P0
    boundary: integration
    lifecycle: accepted
    given:
      - en: Harness Studio requests a project snapshot for a known project id
        zh-CN: Harness Studio 请求一个已知 project id 的 project snapshot
      - en: The local daemon is running for the workspace
        zh-CN: 本地 daemon 正在为该 workspace 运行
    when:
      - en: The Studio calls the daemon snapshot API
        zh-CN: Studio 调用 daemon snapshot API
    then:
      - en: The daemon returns JSON with project, modules, promises, and reviewDrafts fields
        zh-CN: Daemon 返回包含 project、modules、promises 和 reviewDrafts fields 的 JSON
      - en: The JSON field names match the Harness Studio TypeScript snapshot contract
        zh-CN: JSON field names 与 Harness Studio TypeScript snapshot contract 一致
      - en: The web app can fall back to its static snapshot when the daemon is unreachable
        zh-CN: 当 daemon 不可达时，web app 可以回退到静态 snapshot
    observes:
      - crates/harness-daemon/src/main.rs
      - crates/harness-daemon/src/lib.rs
      - apps/web/src/lib/api.ts
      - apps/web/src/data/harness-snapshot.ts
      - apps/web/src/data/todo-backend-snapshot.ts
    failureMeaning:
      en: Harness Studio could not safely switch from static demo data to real daemon-backed project data.
      zh-CN: Harness Studio 无法安全地从静态 demo 数据切换到真实 daemon-backed project data。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-26
      events:
        - action: approved
          by: xinyao
          at: 2026-05-26
