apiVersion: 1
promises:
  - id: harness.promise_registry.load_canonical_yaml_promises
    feature: Seed Harness / Promise Registry
    title:
      en: Accepted promises are loaded from canonical YAML files
      zh-CN: 已接受的承诺会从 canonical YAML 文件中加载
    purpose:
      en: Protect the seed Harness's reviewed behavior promises.
      zh-CN: 保护 seed Harness 能读取自己已批准的行为承诺。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: A promise file exists under the tests/promises root
        zh-CN: tests/promises/ 目录下存在一个 promise 文件
    when:
      - en: The seed Harness loads promise records
        zh-CN: seed Harness 加载 promise records
    then:
      - en: The promise is decoded into a PromiseRecord
        zh-CN: 该 promise 会被解码成 PromiseRecord
      - en: The lifecycle and review metadata are preserved
        zh-CN: lifecycle 和 review metadata 会被保留
    observes:
      - tests/promises/**/*.promises.yaml
    failureMeaning:
      en: The Harness cannot trust its own reviewed behavior promises.
      zh-CN: Harness 无法信任自己已经 review 过的行为承诺。
    review:
      approvedBy: xinyao
      approvedAt: "2026-05-24"

  - id: harness.promise_registry.surfaces_per_record_decode_errors
    feature: Seed Harness / Promise Registry
    title:
      en: Per-record decode errors inside a grouped promise file are surfaced independently
      zh-CN: 容器型 promise 文件内每条记录的解码错误会被独立报告
    purpose:
      en: When one file holds many promise records, a single bad record must not silently drop the rest. Reviewers should always see every record-level error in one pass instead of fixing them one at a time across multiple runs.
      zh-CN: 一个文件装多条 promise records 时，单条记录出错绝不能让同文件其余记录被悄悄丢掉。reviewer 应该一次看到所有 record 级别的错误，而不是要跑很多次每次修一条。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: A `.promises.yaml` file contains multiple promise records and one or more of them are malformed
        zh-CN: 一个 `.promises.yaml` 文件里有多条 promise records，且至少一条格式错误
    when:
      - en: The seed Harness loads promise records from that file
        zh-CN: seed Harness 从该文件加载 promise records
    then:
      - en: Every malformed record produces its own decode error, identifying the file path and the entry index
        zh-CN: 每一条格式错误的记录都会产生自己的解码错误，标明文件路径和数组下标
      - en: The loader does not stop at the first bad record — all per-record errors in the same file surface in one pass
        zh-CN: loader 不会在第一条出错时停下 —— 同一文件内所有 per-record 错误会在一次运行中全部暴露
      - en: A duplicate `id` collision across files (regardless of which file) is still reported by the existing `duplicate_promise_id` rule
        zh-CN: 跨文件的 `id` 冲突（无论哪个文件）仍然由现有 `duplicate_promise_id` 规则报告
    observes:
      - crates/harness-core/src/promise_registry.rs
      - tests/promises/**/*.promises.yaml
    failureMeaning:
      en: Authors moving promises into grouped files may see records silently vanish from the registry whenever a sibling record in the same file has an error — reports, run status, and binding validation all become unreliable in ways that look like missing tests.
      zh-CN: 作者把 promises 搬进容器文件后，一旦同文件里有别的记录出错，可能会看到部分 records 从 registry 里悄悄消失 —— 报告、运行状态和绑定校验全都变得不可靠，看起来像测试缺失。
    review:
      approvedBy: xinyao
      approvedAt: "2026-05-25"
