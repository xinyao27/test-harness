apiVersion: 1
promises:
  - id: harness.adapters.rust.scenario_helper.binds_tests_to_canonical_promises
    feature: Adapters / Rust / Scenario Helper
    title:
      en: Rust tests can bind to canonical promises
      zh-CN: Rust 测试可以绑定到 canonical promises
    purpose:
      en: Protect the Rust self-bootstrapping path so Rust tests carry the same reviewed promise ids as the thin TypeScript Vitest adapter tests.
      zh-CN: 保护 Rust 自举路径，让 Rust 测试携带与精简的 TypeScript Vitest adapter tests 相同的已 review promise ids。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: A canonical promise id is passed to the Rust scenario helper
        zh-CN: 一个 canonical promise id 被传给 Rust scenario helper
    when:
      - en: A Rust test runs through the helper
        zh-CN: 一个 Rust 测试通过该 helper 运行
    then:
      - en: The test outcome is recorded as a Harness adapter event with that promise id
        zh-CN: 测试结果会以该 promise id 记录为 Harness adapter event
      - en: Blank promise ids are rejected before any result is recorded
        zh-CN: 空白 promise id 会在任何结果被记录前被拒绝
    observes:
      - crates/harness-adapter-rust/src/lib.rs
      - .harness/runs/*/events/*.ndjson
    failureMeaning:
      en: Rust tests would become ordinary implementation tests instead of executable evidence for reviewed promises.
      zh-CN: Rust 测试会退化成普通实现测试，而不是已 review promises 的可执行证据。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-25
      events:
        - action: approved
          by: xinyao
          at: 2026-05-25

  - id: harness.adapters.rust.result_collector.maps_results_to_promises
    feature: Adapters / Rust / Result Collector
    title:
      en: Rust test events are mapped into Harness protocol results
      zh-CN: Rust test events 会映射成 Harness protocol results
    purpose:
      en: Protect the adapter contract so Cargo test outcomes can update reviewed promise status through the shared adapter event runtime.
      zh-CN: 保护 adapter contract，让 Cargo test 结果可以通过共享 adapter event runtime 更新已 review promise 的状态。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: Rust scenario tests have written adapter event shards
        zh-CN: Rust scenario tests 已经写出 adapter event shards
    when:
      - en: The adapter runtime merges those shards
        zh-CN: adapter runtime 合并这些 shards
    then:
      - en: The merged file is valid .harness/results.yaml
        zh-CN: 合并后的文件是有效的 .harness/results.yaml
      - en: Each result remains keyed by its canonical promise id
        zh-CN: 每条结果仍然由其 canonical promise id 标识
    observes:
      - crates/harness-adapter-rust/src/lib.rs
      - crates/harness-adapter-runtime/src/**
      - .harness/runs/*/events/*.ndjson
      - .harness/results.yaml
    failureMeaning:
      en: Rust tests could pass in Cargo while the Harness cannot connect them back to reviewed promises.
      zh-CN: Rust 测试可能在 Cargo 中通过，但 Harness 无法把它们连接回已 review promises。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-25
      events:
        - action: approved
          by: xinyao
          at: 2026-05-25

  - id: harness.adapters.rust.result_collector.writes_results_to_explicit_harness_root
    feature: Adapters / Rust / Result Collector
    title:
      en: The Rust result collector writes under the explicit Harness root
      zh-CN: Rust result collector 会写到明确的 Harness root 下
    purpose:
      en: Protect workspace-level protocol results from being written into crate or package subdirectories during Cargo test runs.
      zh-CN: 保护 workspace-level protocol results，避免 Cargo test 运行时结果被写入 crate 或 package 子目录。
    priority: P0
    boundary: integration
    lifecycle: accepted
    given:
      - en: The Harness root is provided through HARNESS_ROOT_DIR
        zh-CN: Harness root 通过 HARNESS_ROOT_DIR 提供
    when:
      - en: The Rust adapter records and merges test results
        zh-CN: Rust adapter 记录并合并测试结果
    then:
      - en: Adapter event shards are written under the configured adapter events directory
        zh-CN: adapter event shards 会写入配置好的 adapter events directory
      - en: The final merged result file is written relative to the explicit Harness root
        zh-CN: 最终合并的 result file 会相对明确的 Harness root 写入
    observes:
      - HARNESS_ROOT_DIR
      - HARNESS_RUN_ID
      - HARNESS_ADAPTER_EVENTS_DIR
      - crates/harness-adapter-rust/src/lib.rs
    failureMeaning:
      en: The Rust CLI may read one result file while Cargo tests write another, making Rust self-bootstrap reports untrustworthy.
      zh-CN: Rust CLI 可能读取一个 result file，而 Cargo tests 写入另一个，导致 Rust 自举报告不可信。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-25
      events:
        - action: approved
          by: xinyao
          at: 2026-05-25

  - id: harness.adapters.rust.runner_merges_shards_after_cargo_test
    feature: Adapters / Rust / Runner
    title:
      en: The Rust adapter runner merges shards after Cargo test
      zh-CN: Rust adapter runner 会在 Cargo test 后合并 shards
    purpose:
      en: Protect the one-command self-bootstrapping path for Rust by wrapping Cargo test and producing the canonical Harness result file.
      zh-CN: 通过包装 Cargo test 并产出 canonical Harness result file，保护 Rust 的一条命令自举路径。
    priority: P0
    boundary: integration
    lifecycle: accepted
    given:
      - en: A user invokes harness-adapter-rust run with Cargo test arguments
        zh-CN: 用户用 Cargo test 参数调用 harness-adapter-rust run
    when:
      - en: Cargo test finishes
        zh-CN: Cargo test 结束
    then:
      - en: Rust adapter event shards are merged into .harness/results.yaml
        zh-CN: Rust adapter event shards 会被合并到 .harness/results.yaml
      - en: The adapter exits with the Cargo test exit code when merging succeeds
        zh-CN: 合并成功时 adapter 会用 Cargo test 的退出码退出
    observes:
      - crates/harness-adapter-rust/src/main.rs
      - crates/harness-adapter-rust/src/lib.rs
    failureMeaning:
      en: Rust could have promise-bound tests but still require framework-specific tooling to collect their results.
      zh-CN: Rust 可能已经有 promise-bound tests，却仍然需要框架特定 tooling 才能收集结果。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-25
      events:
        - action: approved
          by: xinyao
          at: 2026-05-25
