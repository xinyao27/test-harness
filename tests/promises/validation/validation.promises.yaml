apiVersion: 1
promises:
  - id: harness.validation.warns_when_default_language_missing
    feature: Seed Harness / Validation
    title:
      en: Promises without default-language text are warned
      zh-CN: 缺少默认语言文本的 promise 会被警告
    purpose:
      en: Protect bilingual review by ensuring every promise still has English fallback text even when a localized variant is preferred.
      zh-CN: 通过确保每条 promise 即便偏好本地化变体也仍然保留英文 fallback 文本，保护双语 review。
    priority: P1
    boundary: unit
    lifecycle: accepted
    given:
      - en: A promise record has been decoded with localized text fields
        zh-CN: 已解码出带本地化文本字段的 promise record
    when:
      - en: The seed Harness checks each natural-language field for default-language coverage
        zh-CN: seed Harness 检查每个自然语言字段是否覆盖默认语言
    then:
      - en: Fields that are non-blank but lack default-language (en) text produce a `missing_default_language` warning
        zh-CN: 不为空但缺少默认语言（en）文本的字段会产生 `missing_default_language` warning
    observes:
      - crates/harness-core/src/validation.rs
      - crates/harness-core/src/localized_text.rs
    failureMeaning:
      en: Reviewers without the localized variant may see blank promise text when default-language fallback is missing.
      zh-CN: 没有本地化变体的 reviewer 在 default-language fallback 缺失时可能看到空白 promise 文本。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-25
      events:
        - action: approved
          by: xinyao
          at: 2026-05-25

  - id: harness.validation.checks_examples_table_shape
    feature: Seed Harness / Validation
    title:
      en: Examples tables with inconsistent columns or unnamed rows are flagged
      zh-CN: 列不一致或行未命名的 examples 表会被标记
    purpose:
      en: An examples table only delivers review value when reviewers can scan it as a table — every row carries a name and every row shares the same set of columns. Without these checks, the field would accept tables that look like data dumps and reviewers would lose the reason the field exists.
      zh-CN: examples 表只有在 reviewer 能按表格扫读时才有 review 价值 —— 每行有名字，所有行共享同一列集合。没有这些检查，该字段就会接受看起来像数据 dump 的表格，reviewer 也就失去了这个字段存在的理由。
    priority: P1
    boundary: unit
    lifecycle: accepted
    given:
      - en: A promise record has been decoded with a non-empty `examples` array
        zh-CN: 一条 promise record 解码后带有非空的 `examples` 数组
    when:
      - en: The seed Harness validates the promise
        zh-CN: seed Harness 校验这条 promise
    then:
      - en: Rows whose column key set differs from the first row produce an `inconsistent_example_columns` error
        zh-CN: 列键集合与首行不同的行会产生 `inconsistent_example_columns` error
      - en: Rows whose `name` value is missing or blank produce a `blank_example_row_name` error
        zh-CN: "`name` 值缺失或为空白的行会产生 `blank_example_row_name` error"
      - en: Two rows that share the same `name` within one promise produce a `duplicate_example_row_name` error
        zh-CN: 同一 promise 内两行 `name` 相同会产生 `duplicate_example_row_name` error
    observes:
      - crates/harness-core/src/validation.rs
      - tests/promises/**/*.promises.yaml
    failureMeaning:
      en: Reviewers may approve an examples table they cannot actually read as a table — unnamed rows, divergent columns, or duplicate labels make the table no better than a paragraph of prose.
      zh-CN: reviewer 可能会批准他们其实读不成表格的 examples 表 —— 行没有名字、列不一致或者标签重复，这种表跟一段散文没区别。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-25
      events:
        - action: approved
          by: xinyao
          at: 2026-05-25

  - id: harness.validation.rejects_unreadable_promises
    feature: Seed Harness / Validation
    title:
      en: Unreadable canonical promises are reported as validation issues
      zh-CN: 不可读的 canonical promises 会被报告为 validation issues
    purpose:
      en: Protect human review by rejecting or warning about promise metadata that cannot be managed reliably.
      zh-CN: 通过拒绝或警告无法可靠管理的 promise metadata，保护人类 review。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: Canonical promise records have been decoded
        zh-CN: canonical promise records 已经被解码
    when:
      - en: The seed Harness validates promise readability and review metadata
        zh-CN: seed Harness 校验 promise 的可读性和 review metadata
    then:
      - en: Invalid ids, duplicate ids, blank required fields, and vague titles are errors
        zh-CN: invalid ids、duplicate ids、blank required fields 和 vague titles 会成为 errors
      - en: Accepted promises without review approval metadata are warnings
        zh-CN: 缺少 review approval metadata 的 accepted promises 会成为 warnings
    observes:
      - crates/harness-core/src/validation.rs
      - tests/promises/**/*.promises.yaml
    failureMeaning:
      en: Humans may be asked to approve promises that are hard to read, unstable, or not reviewable.
      zh-CN: 人类可能会被要求批准难以阅读、不稳定或无法 review 的 promises。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-24
      events:
        - action: approved
          by: xinyao
          at: 2026-05-24

  - id: harness.validation.rejects_unreadable_modules
    feature: Seed Harness / Validation
    title:
      en: Unreadable canonical modules are reported as validation issues
      zh-CN: 不可读的 canonical modules 会被报告为 validation issues
    purpose:
      en: Protect the architecture-first Harness model by warning when modules look like generic buckets instead of reviewable architecture boundaries.
      zh-CN: 通过在 module 看起来像 generic bucket 而不是可 review architecture boundary 时发出警告，保护 architecture-first 的 Harness 模型。
    priority: P0
    boundary: unit
    lifecycle: proposed
    given:
      - en: Canonical module records have been decoded
        zh-CN: canonical module records 已经被解码
    when:
      - en: The seed Harness validates module readability and architecture ownership
        zh-CN: seed Harness 校验 module 的可读性与架构归属
    then:
      - en: Duplicate module ids, invalid ids, and blank required fields are errors
        zh-CN: duplicate module ids、invalid ids 和 blank required fields 会成为 errors
      - en: Modules without default English text or with generic bucket names are warnings
        zh-CN: 缺少默认英文文本或使用 generic bucket 名称的 modules 会成为 warnings
    observes:
      - crates/harness-core/src/validation.rs
      - tests/modules/*.module.yaml
    failureMeaning:
      en: Agents could create modules as arbitrary labels, hiding the real project architecture from reviewers.
      zh-CN: Agent 可能把 module 创建成任意标签，从而向 reviewer 隐藏真实项目架构。
    review:
      state: pending
      events: []

  - id: harness.validation.flags_unknown_scenario_bindings
    feature: Seed Harness / Validation
    title:
      en: Scenario bindings to non-canonical promise ids are flagged
      zh-CN: 绑定到非 canonical promise id 的 scenarioTest 会被标记
    purpose:
      en: Protect the seed loop so a typo or stale id in `scenarioTest(promiseId, ...)` cannot silently pass as evidence for a real promise.
      zh-CN: 保护 seed loop —— `scenarioTest(promiseId, ...)` 中的拼写错误或失效 id 不能悄悄被当作真实 promise 的证据。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: Canonical promise records and scenario bindings have been collected
        zh-CN: Canonical promise records 和 scenario bindings 已经收集完毕
    when:
      - en: The seed Harness compares each scenario binding's id against the canonical promise id set
        zh-CN: seed Harness 用 canonical promise id 集合逐一匹配每个 scenario binding 的 id
    then:
      - en: Each scenario binding whose id does not match any canonical promise is reported as an error
        zh-CN: 每个 id 不匹配任何 canonical promise 的 scenario binding 都会被报告为 error
    observes:
      - crates/harness-core/src/validation.rs
      - packages/adapter-vitest/src/index.ts
    failureMeaning:
      en: A test bound to a non-existent promise id can pass without ever proving any reviewed behavior.
      zh-CN: 绑定到不存在 promise id 的测试可以通过，但从未真正证明任何已 review 的行为。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-25
      events:
        - action: approved
          by: xinyao
          at: 2026-05-25

  - id: harness.validation.flags_uncovered_source_files
    feature: Seed Harness / Validation
    title:
      en: Source files not covered by any module are flagged
      zh-CN: 没有被任何 module 覆盖的源文件会被标记
    purpose:
      en: Protect the project's architecture-first review surface by mechanically detecting code that has no module owner.
      zh-CN: 通过机械化检测没有 module owner 的代码，保护项目"以 architecture 为先"的 review 表面。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: Module records have been loaded with their covers fields
        zh-CN: module records 已经加载，且 covers 字段已读取
      - en: Source files under packages/, apps/, and protocol/ have been scanned
        zh-CN: packages/、apps/ 和 protocol/ 下的源文件已被扫描
    when:
      - en: The seed Harness cross-references each scanned source file against every module's covers list
        zh-CN: seed Harness 用每个 module 的 covers 列表逐一匹配每个被扫描到的源文件
    then:
      - en: Each source file not matched by any covers entry is reported as an error
        zh-CN: 每个没有被任何 covers entry 匹配到的源文件都会被报告为 error
      - en: Covers entries support exact paths and `<dir>/**` recursive globs
        zh-CN: covers entries 支持精确路径以及 `<dir>/**` 形式的递归 glob
    observes:
      - crates/harness-core/src/validation.rs
      - crates/harness-core/src/module_registry.rs
      - tests/modules/*.module.yaml
    failureMeaning:
      en: New code can land without any architecture module taking review ownership, so reviewers cannot tell which system part is responsible for it.
      zh-CN: 新代码可能在没有任何 architecture module 接手 review 的情况下落地，reviewer 无法判断它归哪个系统部分负责。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-25
      events:
        - action: approved
          by: xinyao
          at: 2026-05-25

  - id: harness.validation.flags_promises_without_test_results
    feature: Seed Harness / Validation
    title:
      en: Reviewed promises without collected test results are flagged, with severity matching the lifecycle
      zh-CN: 已 review 通过但没有 test results 的 promise 会被标记，严重度按 lifecycle 升级
    purpose:
      en: Promise without test is meaningless — the whole "review promises, not code" premise rests on tests being the executable encoding of each promise. The check must close the gap between a human signing off and the code actually proving it, so an approved promise can never sit forever with zero results bound to its id.
      zh-CN: 没有测试的 promise 是空头承诺——「review promise 不 review 代码」这个前提依赖测试是 promise 的可执行编码。Checker 必须堵住「人已经签字」和「代码真的证明它」之间的口子，让一个 approved promise 永远不可能长期挂着零绑定结果。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: Canonical promises and the project's .harness/results.yaml have been loaded
        zh-CN: canonical promises 和项目的 .harness/results.yaml 已被加载
    when:
      - en: The seed Harness check compares each promise with the collected test results
        zh-CN: seed Harness check 将每条 promise 与已收集的 test results 进行比较
    then:
      - en: An `implemented` promise with no matching result is reported as an Error — implemented claims that both code and tests already exist, so zero evidence is a direct contradiction
        zh-CN: lifecycle 为 `implemented` 但没有任何匹配 result 的 promise 报告为 Error——implemented 表示「代码和测试都到位」，零证据与之直接矛盾
      - en: An `accepted` or `changed_requires_review` promise with no matching result is reported as a Warning — the human signed off but the implementation and tests have not caught up yet
        zh-CN: lifecycle 为 `accepted` 或 `changed_requires_review` 且没有匹配 result 的 promise 报告为 Warning——人已经签字，但实现和测试还没跟上
      - en: A `proposed` or `deprecated` promise is silent — proposed has not been signed off yet, and deprecated is no longer in scope
        zh-CN: lifecycle 为 `proposed` 或 `deprecated` 的 promise 不报——proposed 尚未签字，deprecated 已经不在 scope 内
      - en: A test result whose promise id does not match any canonical promise is still reported as an Error (catches binding typos in either direction)
        zh-CN: promise id 不匹配任何 canonical promise 的 test result 仍然报告为 Error（两个方向的绑定 typo 都能抓住）
      - en: Each issue includes the promise id, its module, and its lifecycle, so a reviewer (or agent) can act without re-reading the YAML
        zh-CN: 每条 issue 都包含 promise id、其 module 和 lifecycle，让 reviewer（或 agent）无需重读 YAML 就能动手
    observes:
      - .harness/results.yaml
      - crates/harness-core/src/validation.rs
    failureMeaning:
      en: A reviewed promise can be approved by a human while no executable evidence ties it to any code path; harness check happily reports "Errors 0, Warnings 0" and the team trusts a story that isn't actually grounded.
      zh-CN: 一条 reviewed promise 能被人 approved，却没有任何可执行证据把它绑到任何代码路径；harness check 仍然报 "Errors 0, Warnings 0"，团队相信一个根本没落地的故事。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-28
      events:
        - action: approved
          by: xinyao
          at: 2026-05-24
        - action: changes_requested
          by: claude
          at: 2026-05-28
          note: "Broaden scope and split severity: also flag accepted / changed_requires_review (Warning), and upgrade implemented to Error — implemented = code + tests, zero evidence is a contradiction."
        - action: approved
          by: xinyao
          at: 2026-05-28
          note: "Re-approved broadened scope."

  - id: harness.validation.detects_promise_content_drift_after_acceptance
    feature: Seed Harness / Validation
    title:
      en: An accepted promise whose reviewable content changed after approval is flagged as drifted
      zh-CN: 已 approved 的 promise，如果其可 review 内容在 approve 之后被改动，会被标记为漂移
    purpose:
      en: The whole "review promises, not code" premise rests on the reviewed text staying stable until the next review event. If the title, purpose, given / when / then, observes, priority, boundary, or examples of an `accepted` promise change while lifecycle stays `accepted`, the reviewer's signature no longer covers what's in the file. Make that gap impossible to hit by recording the content the human approved and re-checking it.
      zh-CN: 「review promise 不 review 代码」这个前提，依赖被 review 的文本在下一次 review 之前保持稳定。一个 `accepted` promise 的 title、purpose、given/when/then、observes、priority、boundary 或 examples 在 approve 之后被改动了，而 lifecycle 还停在 `accepted`，那 reviewer 的签字就不再代表文件里的内容。通过把人 approve 的内容记录下来再重新比对，让这个漏洞不可达。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: A promise is approved through the daemon (the review action records the content the human signed off on)
        zh-CN: 一条 promise 通过 daemon 被 approved（review 动作记录下了人当时签字所对应的内容）
      - en: Later, that promise's reviewable fields are edited
        zh-CN: 之后，该 promise 的可 review 字段被修改
    when:
      - en: harness check runs against the current promise file
        zh-CN: harness check 在当前 promise 文件上运行
    then:
      - en: On approval, the daemon stores a deterministic hash of the reviewable content (title, purpose, priority, boundary, given/when/then, observes, failureMeaning, examples) under `review.contentHash`
        zh-CN: approve 时，daemon 会把可 review 内容（title、purpose、priority、boundary、given/when/then、observes、failureMeaning、examples）的确定性 hash 写到 `review.contentHash`
      - en: An `accepted` (or `implemented`) promise whose current content hash does not match the stored `review.contentHash` is reported as a Warning `accepted_promise_content_drifted`, naming the promise id, its module, and that the review signature no longer covers the file's content
        zh-CN: lifecycle 为 `accepted`（或 `implemented`）但当前内容 hash 与 `review.contentHash` 不一致的 promise 会被报告为 Warning `accepted_promise_content_drifted`，并指出 promise id、module，以及 review 签字已不覆盖当前文件内容
      - en: A promise whose `review.contentHash` is absent is silent — this is the migration path for promises approved before the field existed; no false positives
        zh-CN: 缺 `review.contentHash` 字段的 promise 不报——这是字段加入前已 approved 的 promise 的迁移路径；不引入误报
      - en: A `proposed`, `changed_requires_review`, or `deprecated` promise is silent — drift only matters once the reviewer has signed off and the lifecycle has not since transitioned through a review event
        zh-CN: "`proposed`、`changed_requires_review` 或 `deprecated` 的 promise 不报——只在人已经签字、且 lifecycle 后续没有再走 review 事件时，drift 才有意义"
    observes:
      - crates/harness-core/src/validation.rs
      - crates/harness-protocol/src/lib.rs
      - crates/harness-daemon/src/main.rs
    failureMeaning:
      en: A reviewer can sign off on a promise, then the text quietly changes underneath them — title shifts, then-clauses weaken, observes shrinks — and the report still shows "approved" while the meaning has moved. Promise-first review becomes ceremony.
      zh-CN: Reviewer 签完字之后，文本可以在他们脚下悄悄变化——title 改了、then 条款被削弱、observes 收窄——而 report 仍显示「approved」，意义已经偏移。Promise-first review 就变成走过场。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-28
      events:
        - action: approved
          by: xinyao
          at: 2026-05-28
