apiVersion: 1
promises:
  - id: harness.web_dashboard.agent_panel_runs_inline_terminal
    feature: Harness Studio / Agent panel
    title:
      en: Studio's Agent Panel runs the agent CLI inline so the user never leaves Studio to drive it
      zh-CN: Studio 的 Agent Panel 在面板内运行 agent CLI，用户无须离开 Studio 就能驱动它
    purpose:
      en: Make the agent feel like a first-class collaborator inside the harness — opening the Agent Panel reveals a live terminal where the agent runs, side by side with the canvas and review panel, so a review-then-implement loop is one continuous conversation rather than a window-switching dance.
      zh-CN: 让 agent 在 harness 里像一等公民——打开 Agent Panel 就看到一个实时终端，agent 在里面运行，和 canvas、review 面板并排存在，让「review 完接着实现」是一次连续对话，而不是来回切窗口。
    priority: P0
    boundary: browser
    lifecycle: accepted
    given:
      - en: A paired Studio session
        zh-CN: 一个已配对的 Studio session
    when:
      - en: The user opens the Agent Panel
        zh-CN: 用户打开 Agent Panel
    then:
      - en: Studio opens a WebSocket to the daemon's /api/agent/pty endpoint and renders the bidirectional byte stream in an inline terminal (xterm.js or equivalent) inside the panel
        zh-CN: Studio 向 daemon 的 /api/agent/pty 打开 WebSocket，并把双向字节流渲染在面板内的一个内嵌终端（xterm.js 或同类）里
      - en: Typing in the terminal sends bytes to the agent; resizing the panel resizes the pty
        zh-CN: 在终端里输入会发字节给 agent；面板尺寸变化会把 pty 同步 resize
      - en: Closing the panel or navigating away closes the WebSocket so the daemon can reap the agent process
        zh-CN: 关闭面板或离开当前页面会关闭 WebSocket，让 daemon 能 reap agent 进程
      - en: The panel renders side-by-side with the canvas, not as a full-screen takeover, so the user can keep reviewing while the agent works
        zh-CN: 面板和 canvas 并排存在，不是全屏覆盖，让用户能边 review 边让 agent 干活
    observes:
      - apps/web/src/features/studio/**
    failureMeaning:
      en: The agent stays a separate window in the user's other terminal app, breaking the "harness is one canvas" feeling — every loop becomes a window-switching dance instead of a fluid conversation next to the work.
      zh-CN: agent 还留在用户的另一个终端 app 里，打破了「harness 是一张 canvas」的感觉——每一次循环都变成切窗口，而不是在工作旁边的流畅对话。
    review:
      state: approved
      decidedBy: xinyao
      decidedAt: 2026-05-28
      events:
        - action: approved
          by: xinyao
          at: 2026-05-28
