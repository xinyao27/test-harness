apiVersion: 1
promises:
  - id: harness.web_dashboard.shows_low_pressure_review_inbox
    feature: Harness Studio / Promise Review Workbench
    title:
      en: Harness Studio shows a low-pressure Promise Inbox from the canvas
      zh-CN: Harness Studio 从 canvas 展示低压力 Promise Inbox
    purpose:
      en: Let reviewers find the promises that need human judgment without leaving the canvas or opening raw YAML.
      zh-CN: 让 reviewer 不离开 canvas、不打开原始 YAML，也能找到需要人工判断的 promises。
    priority: P0
    boundary: browser
    lifecycle: proposed
    given:
      - en: Harness Studio has loaded a project snapshot with modules and promises
        zh-CN: Harness Studio 已加载包含 modules 和 promises 的 project snapshot
    when:
      - en: The reviewer opens the Inbox entry from the floating canvas controls
        zh-CN: Reviewer 从 canvas 上的浮动 controls 打开 Inbox 入口
    then:
      - en: Studio shows a Promise Inbox panel over the canvas, with no sidebar or page transition
        zh-CN: Studio 会在 canvas 上展示 Promise Inbox panel，而不是切换页面或显示 sidebar
      - en: The Inbox prioritizes pending and changed promises by priority and module context
        zh-CN: Inbox 会按 priority 和 module context 优先展示 pending 与 changed promises
      - en: Selecting an Inbox item focuses the corresponding promise in the canvas and opens its review panel
        zh-CN: 选择 Inbox item 会聚焦 canvas 中对应的 promise，并打开它的 review panel
    observes:
      - apps/web/src/features/studio/**
      - packages/i18n/**
    failureMeaning:
      en: Reviewers would still need to hunt through graph nodes or YAML files before deciding what needs review.
      zh-CN: Reviewer 仍然需要在 graph nodes 或 YAML files 里寻找哪些内容需要 review。
    review:
      state: pending
      events: []

  - id: harness.web_dashboard.presents_promise_review_without_editing_pressure
    feature: Harness Studio / Promise Review Workbench
    title:
      en: Harness Studio presents Promise review without making editing the primary action
      zh-CN: Harness Studio 展示 Promise review 时不会把编辑作为主操作
    purpose:
      en: Make the first review experience about fast human judgment, not about filling or repairing a form.
      zh-CN: 让第一阶段 review 体验聚焦快速人工判断，而不是填写或修补表单。
    priority: P0
    boundary: browser
    lifecycle: proposed
    given:
      - en: A reviewer has selected a promise that needs review
        zh-CN: Reviewer 已选择一个需要 review 的 promise
    when:
      - en: Studio renders the promise context panel
        zh-CN: Studio 渲染 promise context panel
    then:
      - en: The panel shows module context, purpose, scenario, evidence, module neighborhood, and advisory review hints
        zh-CN: Panel 会展示 module context、purpose、scenario、evidence、module neighborhood 和提示型 review hints
      - en: The primary actions are Approve, Request changes, and Decline
        zh-CN: 主操作是 Approve、Request changes 和 Decline
      - en: Editing promise content is not presented as the main path for review
        zh-CN: 编辑 promise 内容不会被展示为 review 的主路径
    observes:
      - apps/web/src/features/studio/**
      - packages/i18n/**
    failureMeaning:
      en: The Studio would turn review into another engineering form and make reviewers slower and less confident.
      zh-CN: Studio 会把 review 变成另一个工程表单，让 reviewer 更慢也更没有信心。
    review:
      state: pending
      events: []

  - id: harness.web_dashboard.writes_review_decisions_through_daemon
    feature: Harness Studio / Review Writeback
    title:
      en: Harness Studio writes Promise review decisions through the local daemon
      zh-CN: Harness Studio 通过本地 daemon 写入 Promise review decisions
    purpose:
      en: Keep browser review actions traceable while preserving canonical YAML as the source of truth.
      zh-CN: 在保持 canonical YAML 作为事实来源的同时，让浏览器里的 review action 可追溯。
    priority: P0
    boundary: integration
    lifecycle: proposed
    given:
      - en: Harness Studio is paired with an authenticated local daemon
        zh-CN: Harness Studio 已与认证后的本地 daemon 配对
      - en: A reviewer submits Approve, Request changes, or Decline for a promise
        zh-CN: Reviewer 对一个 promise 提交 Approve、Request changes 或 Decline
    when:
      - en: The daemon receives the review decision
        zh-CN: Daemon 收到 review decision
    then:
      - en: The daemon updates only canonical review metadata and necessary lifecycle state
        zh-CN: Daemon 只更新 canonical review metadata 和必要的 lifecycle state
      - en: The daemon appends a review event, runs Harness validation, and rolls back the write if validation fails
        zh-CN: Daemon 会追加 review event、运行 Harness validation，并在 validation 失败时回滚写入
      - en: Studio refreshes the snapshot after an accepted write so the Inbox reflects the canonical files
        zh-CN: 写入被接受后 Studio 会刷新 snapshot，让 Inbox 反映 canonical files
    observes:
      - crates/harness-daemon/**
      - apps/web/src/lib/api.ts
      - apps/web/src/features/studio/**
      - tests/promises/web-dashboard/**
    failureMeaning:
      en: Review decisions would become UI-only state, weakening the promise-driven workflow.
      zh-CN: Review decision 会变成只存在于 UI 的状态，削弱 promise-driven workflow。
    review:
      state: pending
      events: []

  - id: harness.web_dashboard.highlights_changed_promises_with_minimal_diff
    feature: Harness Studio / Changed Promise Review
    title:
      en: Harness Studio highlights changed promises with a minimal review diff
      zh-CN: Harness Studio 用最小 review diff 突出 changed promises
    purpose:
      en: Help reviewers decide whether a changed promise drift is acceptable before rereading the full promise body.
      zh-CN: 帮助 reviewer 在重读完整 promise 之前判断 changed promise 的 drift 是否可以接受。
    priority: P1
    boundary: browser
    lifecycle: proposed
    given:
      - en: A promise has lifecycle changed_requires_review
        zh-CN: 一个 promise 的 lifecycle 是 changed_requires_review
    when:
      - en: The reviewer opens that promise from the Promise Inbox or canvas
        zh-CN: Reviewer 从 Promise Inbox 或 canvas 打开这个 promise
    then:
      - en: Studio shows changed fields before the full review body when baseline data is available
        zh-CN: 当 baseline data 可用时，Studio 会先展示 changed fields，再展示完整 review body
      - en: Studio clearly states when no baseline is available
        zh-CN: 当没有 baseline 时，Studio 会明确说明 no baseline available
    observes:
      - apps/web/src/features/studio/**
      - crates/harness-daemon/**
    failureMeaning:
      en: Changed promises would look like new promises, hiding weakening or narrowing drift from reviewers.
      zh-CN: Changed promises 会看起来像 new promises，导致 reviewer 看不到 weakening 或 narrowing drift。
    review:
      state: pending
      events: []
