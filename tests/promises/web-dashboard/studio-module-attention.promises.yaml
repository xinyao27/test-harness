apiVersion: 1
promises:
  - id: harness.web_dashboard.marks_modules_with_review_attention
    feature: Harness Studio / Module Attention
    title:
      en: Harness Studio marks modules that contain promises needing review
      zh-CN: Harness Studio 会标记包含待 review promises 的 modules
    purpose:
      en: Help reviewers see which architecture modules changed or need attention without opening every module manually.
      zh-CN: 帮助 reviewer 不用逐个打开 module，就能看出哪些 architecture modules 有变更或需要关注。
    priority: P0
    boundary: browser
    lifecycle: proposed
    given:
      - en: The active project snapshot contains modules and their owned promises
        zh-CN: 当前 active project snapshot 包含 modules 以及它们拥有的 promises
      - en: Some owned promises are proposed, changed, pending review, or otherwise require human review attention
        zh-CN: 某些 owned promises 处于 proposed、changed、pending review，或其他需要人类 review 关注的状态
    when:
      - en: The reviewer views the project-level module graph or focuses a module
        zh-CN: Reviewer 查看 project-level module graph，或聚焦某个 module
    then:
      - en: Each module node with review-required owned promises shows a compact attention dot in the node's upper-right area
        zh-CN: 每个包含 review-required owned promises 的 module node 都会在右上角区域展示紧凑的 attention dot
      - en: The indicator is derived from promise lifecycle and review state, not from hardcoded module ids or frontend-only mock data
        zh-CN: 该提示由 promise lifecycle 和 review state 推导，而不是来自 hardcoded module ids 或 frontend-only mock data
      - en: The indicator disappears when the module no longer owns promises that require review attention
        zh-CN: 当该 module 不再拥有需要 review attention 的 promises 时，提示会消失
      - en: Selecting the module makes the review-required promises visible before lower-priority or already-reviewed promises
        zh-CN: 选中该 module 后，需要 review 的 promises 会优先出现在低优先级或已 review 的 promises 之前
      - en: The indicator uses semantic theme tokens for attention color and does not hardcode Tailwind palette colors
        zh-CN: 该提示使用语义化 theme tokens 表达 attention color，不硬编码 Tailwind palette colors
    observes:
      - apps/web/src/features/studio/**
      - apps/web/src/data/harness-snapshot.ts
      - apps/web/src/index.css
      - packages/i18n/messages/*.json
      - tests/modules/**/*.module.yaml
      - tests/promises/**/*.promises.yaml
    failureMeaning:
      en: Reviewers would know that promises changed only by remembering file edits or opening every module, making the architecture graph a passive map instead of a review surface.
      zh-CN: Reviewer 只能靠记住文件改动或逐个打开 module 才知道 promises 有变化，这会让 architecture graph 退化成被动地图，而不是 review 入口。
    review: {}
