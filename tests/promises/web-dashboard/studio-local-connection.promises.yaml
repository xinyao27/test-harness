apiVersion: 1
promises:
  - id: harness.web_dashboard.connects_to_local_daemon_without_login
    feature: Harness Studio / Local Daemon Connection
    title:
      en: Harness Studio connects to the local daemon without account login
      zh-CN: Harness Studio 无需账号登录即可连接本地 daemon
    purpose:
      en: Preserve the simple Web Studio plus local daemon model while making project switching, snapshots, runs, and future agent control real instead of visual-only.
      zh-CN: 保持 Web Studio 加本地 daemon 的简单模型，同时让 project switching、snapshots、runs 和未来 agent control 都成为真实能力，而不是仅仅视觉变化。
    priority: P0
    boundary: browser
    lifecycle: proposed
    given:
      - en: Harness Studio is opened from a browser or packaged shell
        zh-CN: Harness Studio 从浏览器或 packaged shell 打开
      - en: A compatible local Harness daemon may or may not be running on loopback
        zh-CN: 兼容的本地 Harness daemon 可能正在 loopback 上运行，也可能没有运行
    when:
      - en: The Studio initializes, switches projects, refreshes snapshots, runs commands, or opens daemon settings
        zh-CN: Studio 初始化、切换 projects、刷新 snapshots、运行 commands，或打开 daemon settings
    then:
      - en: The Studio never shows account login as a requirement for local daemon use
        zh-CN: Studio 不会把账号登录作为使用本地 daemon 的要求
      - en: The Studio can discover daemon availability, show disconnected, pairing, connected, and invalid-session states, and recover to read-only static data when needed
        zh-CN: Studio 可以发现 daemon 可用性，展示 disconnected、pairing、connected 和 invalid-session 状态，并在需要时回退到 read-only static data
      - en: The Studio stores and sends only the local session token issued by the daemon, not a global user token
        zh-CN: Studio 只保存并发送 daemon 签发的 local session token，而不是 global user token
      - en: Project switcher options and selected snapshots come from the authenticated daemon project registry when the daemon is connected
        zh-CN: Daemon 已连接时，project switcher options 和已选 snapshot 来自认证后的 daemon project registry
      - en: Settings expose connection status, pairing, and local token revocation through shadcn/ui controls
        zh-CN: Settings 通过 shadcn/ui controls 暴露 connection status、pairing 和 local token revocation
    observes:
      - apps/web/src/features/studio/**
      - apps/web/src/lib/api.ts
      - packages/i18n/messages/*.json
      - crates/harness-daemon/**
      - docs/design/local-daemon-studio-connection.md
      - docs/design/local-daemon-studio-connection.zh-CN.md
    failureMeaning:
      en: Harness Studio would either remain a static mock, require unnecessary login, or let project switching pretend to work without authenticated daemon-backed data.
      zh-CN: Harness Studio 要么停留在静态 mock，要么引入不必要登录，要么让 project switching 在没有认证 daemon 数据的情况下假装可用。
    review:
      state: pending
      events: []
