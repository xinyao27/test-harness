apiVersion: 1
id: report
title:
  en: Report — localized rendering of promise status
  zh-CN: Report — promise status 的本地化渲染
summary:
  en: Resolves each promise's LocalizedText fields to the requested language when rendering. Currently supports English and Chinese; the same renderer is what the CLI report commands invoke under the hood.
  zh-CN: 渲染时把每条 promise 的 LocalizedText 字段解析到请求的语言。当前支持英文和中文；CLI report 命令底层调用的就是这个 renderer。
purpose:
  en: Without this module bilingual review breaks down — Chinese-speaking reviewers would have to read promises in English regardless of the locale they asked for.
  zh-CN: 没有这个模块，双语 review 就会失效 — 中文 reviewer 不管请求什么语言，都只能看英文 promises。
promises:
  - harness.report.computes_promise_run_status_from_results
  - harness.report.falls_back_through_language_chain
  - harness.report.renders_in_requested_language
covers:
  - crates/harness-core/src/localized_text.rs
  - crates/harness-core/src/report.rs
