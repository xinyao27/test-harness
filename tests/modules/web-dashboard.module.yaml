apiVersion: 1
id: web-dashboard
title:
  en: Web Dashboard — visual promise workbench
  zh-CN: Web Dashboard — Visual Promise Workbench
summary:
  en: The Vite frontend that lets humans explore modules, promises, review queues, generated drafts, and run status without opening raw YAML first.
  zh-CN: Vite 前端，让人无需先打开原始 YAML，就能浏览 Module、Promise、Review Queue、Draft 和 Run Status。
purpose:
  en: The dashboard is the human-facing visualization layer for the promise-driven Harness; it must make review and navigation legible before daemon-backed writes exist.
  zh-CN: Dashboard 是 promise-driven Harness 面向人类的可视化层；在 daemon-backed 写入能力出现前，它也必须让 Review 和导航足够清晰。
promises:
  - harness.web_dashboard.i18n_switches_chrome_and_snapshot_text
covers:
  - apps/web/**
  - packages/i18n/**
