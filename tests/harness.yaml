apiVersion: 1
test:
  runner:
    command: cargo
    args:
      - run
      - --quiet
      - -p
      - harness-runner
      - --
      - run
      - --
      - sh
      - -c
      - >-
        cargo test -p harness-cucumber-rs --test rust_cucumber_bridge &&
        pnpm --filter @test-harness/cucumber-js run test:cucumber
