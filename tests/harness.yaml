apiVersion: 1
test:
  runner:
    command: cargo
    args:
      - run
      - --quiet
      - -p
      - harness-adapter-runtime
      - --
      - run
      - --
      # Development self-bootstrap command for this monorepo. Packaged users should
      # invoke the installed Harness binary or adapter entrypoint instead of Cargo.
      #
      # Keep this scoped to the Harness repository's own evidence tests. Example
      # projects have their own tests/harness.yaml files and should not leak their
      # promise ids into the root self-bootstrap result file.
      - vp
      - test
      - run
      - packages/adapter-vitest/tests
      - apps/web/src
