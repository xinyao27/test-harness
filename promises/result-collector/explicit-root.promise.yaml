# Canonical behavior promise for writing collected results to the explicit Harness root.
id: harness.result_collector.writes_results_to_explicit_harness_root
feature: Seed Harness / Result Collector
title:
  en: The result collector writes results under the explicit Harness root
  zh-CN: result collector 会把结果写到明确的 Harness root 下
purpose:
  en: Protect workspace-level reports from result files being written into package subdirectories.
  zh-CN: 保护 workspace-level reports，避免 result files 被写进 package 子目录。
priority: P0
boundary: integration
lifecycle: accepted

given:
  - en: The Harness root is provided through HARNESS_ROOT_DIR
    zh-CN: Harness root 通过 HARNESS_ROOT_DIR 提供
when:
  - en: The Vitest reporter persists collected promise results
    zh-CN: Vitest reporter 持久化收集到的 promise results
then:
  - en: The result file is written relative to the explicit Harness root
    zh-CN: result file 会相对明确的 Harness root 写入
  - en: The reporter falls back to the test process cwd only when no explicit root is provided
    zh-CN: 只有没有提供明确 root 时，reporter 才 fallback 到 test process cwd
observes:
  - .harness/results.yaml
  - HARNESS_ROOT_DIR
  - packages/core/src/vitest-reporter.ts

failureMeaning:
  en: The CLI may read one result file while Vitest writes another, making the self-report untrustworthy.
  zh-CN: CLI 可能读取一个 result file，而 Vitest 写入另一个，导致 self-report 不可信。

review:
  approvedBy: xinyao
  approvedAt: "2026-05-24"
