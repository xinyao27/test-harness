# Canonical behavior promise for mapping Vitest results back to reviewed promises.
apiVersion: 1
id: harness.adapters.vitest.result_collector.maps_results_to_promises
feature: Adapters / Vitest / Result Collector
title:
  en: Vitest results are mapped into Harness protocol results
  zh-CN: Vitest 结果会映射成 Harness protocol results
purpose:
  en: Protect the adapter contract so executable Vitest outcomes can update reviewed promise status through the stable result protocol.
  zh-CN: 保护 adapter contract，让可执行 Vitest 结果可以通过稳定的 result protocol 更新已 review promise 的状态。
priority: P0
boundary: unit
lifecycle: accepted

given:
  - en: A Vitest test is bound to a canonical promise id
    zh-CN: 一个 Vitest 测试绑定到 canonical promise id
when:
  - en: The Harness result collector reads Vitest task metadata
    zh-CN: Harness result collector 读取 Vitest task metadata
then:
  - en: The collected result is persisted to .harness/results.yaml
    zh-CN: 收集到的结果会持久化到 .harness/results.yaml
  - en: The report uses that result to derive the promise run status
    zh-CN: report 会使用该结果推导 promise run status
observes:
  - .harness/results.yaml
  - packages/adapter-vitest/src/reporter.ts

failureMeaning:
  en: The Harness cannot show whether reviewed promises are currently backed by passing tests.
  zh-CN: Harness 无法展示已 review 的 promises 当前是否由通过的测试支撑。

review:
  approvedBy: xinyao
  approvedAt: "2026-05-24"
