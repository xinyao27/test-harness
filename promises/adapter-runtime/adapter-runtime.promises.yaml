apiVersion: 1
promises:
  - id: harness.adapter_runtime.collects_event_shards_into_results
    feature: Adapter Runtime / Result Collection
    title:
      en: Adapter event shards become canonical Harness results
      zh-CN: Adapter event shards 会变成 canonical Harness results
    purpose:
      en: Protect the language-neutral collection path so thin adapters only emit events while Rust-owned runtime logic writes the canonical .harness/results.yaml file.
      zh-CN: 保护语言无关的收集路径，让薄 adapter 只输出 events，而由 Rust 拥有的 runtime 逻辑写出 canonical .harness/results.yaml。
    priority: P0
    boundary: integration
    lifecycle: accepted
    given:
      - en: One or more adapters have written adapter event shards for a run
        zh-CN: 一个或多个 adapter 已经为某次运行写出 adapter event shards
    when:
      - en: The adapter runtime merges that run
        zh-CN: adapter runtime 合并该次运行
    then:
      - en: The runtime decodes only protocol-valid adapter events
        zh-CN: runtime 只解码 protocol-valid adapter events
      - en: The runtime writes .harness/results.yaml with apiVersion 1 and stable promise-keyed results
        zh-CN: runtime 会写出带 apiVersion 1 且按 promise 稳定标识的 .harness/results.yaml
      - en: Repeated result identities are resolved by the latest event in deterministic shard order
        zh-CN: 重复 result identity 会按 deterministic shard order 取最新 event
    observes:
      - crates/harness-adapter-runtime/src/**
      - .harness/runs/*/events/*.ndjson
      - .harness/results.yaml
    failureMeaning:
      en: Test frameworks could produce evidence that the Harness cannot turn into reviewed promise status.
      zh-CN: 测试框架可能产出 Harness 无法转成已 review promise 状态的证据。
    review:
      approvedBy: xinyao
      approvedAt: "2026-05-25"

  - id: harness.adapter_runtime.uses_isolated_run_event_directories
    feature: Adapter Runtime / Run Isolation
    title:
      en: Adapter events are isolated by run id
      zh-CN: Adapter events 会按 run id 隔离
    purpose:
      en: Protect concurrent and repeated test runs from sharing a single append target or mixing stale adapter events with fresh results.
      zh-CN: 保护并发和重复测试运行，避免它们共享同一个 append 目标，或把陈旧 adapter events 混进新结果。
    priority: P0
    boundary: integration
    lifecycle: accepted
    given:
      - en: A Harness run has a concrete run id
        zh-CN: 一次 Harness 运行有明确的 run id
    when:
      - en: Adapters write event shards for that run
        zh-CN: adapters 为该次运行写入 event shards
    then:
      - en: Event shards are written under .harness/runs/<run-id>/events
        zh-CN: event shards 会写入 .harness/runs/<run-id>/events
      - en: Clearing one run removes only that run's event directory
        zh-CN: 清理某次运行只会删除该 run 的 event directory
      - en: The runtime can merge a selected run without reading unrelated run directories
        zh-CN: runtime 可以只合并指定 run，而不读取无关 run directories
    observes:
      - HARNESS_RUN_ID
      - HARNESS_ADAPTER_EVENTS_DIR
      - crates/harness-adapter-runtime/src/**
    failureMeaning:
      en: The Harness could report stale or cross-run evidence as if it belonged to the current test run.
      zh-CN: Harness 可能把陈旧或跨运行的证据当作当前测试运行的证据报告。
    review:
      approvedBy: xinyao
      approvedAt: "2026-05-25"

  - id: harness.adapter_runtime.preserves_framework_independent_evidence
    feature: Adapter Runtime / Evidence Model
    title:
      en: Runtime results preserve framework-independent evidence
      zh-CN: Runtime results 会保留框架无关的证据
    purpose:
      en: Protect future adapters by keeping the canonical result model focused on promise id, source file, test name, status, optional labels, and failure message rather than framework-specific task objects.
      zh-CN: 通过让 canonical result model 聚焦 promise id、source file、test name、status、可选 labels 和 failure message，而不是框架特定 task object，保护未来 adapters。
    priority: P0
    boundary: unit
    lifecycle: accepted
    given:
      - en: An adapter event contains a test result payload from any supported framework
        zh-CN: 一个 adapter event 包含来自任意支持框架的 test result payload
    when:
      - en: The runtime converts the event into a Harness TestResult
        zh-CN: runtime 把该 event 转成 Harness TestResult
    then:
      - en: The promise id, file, test name, status, labels, and failure message are preserved exactly
        zh-CN: promise id、file、test name、status、labels 和 failure message 会被原样保留
      - en: Framework-specific fields are not required for the canonical result file
        zh-CN: canonical result file 不要求框架特定字段
    observes:
      - protocol/v1/adapter-event.schema.yaml
      - protocol/v1/results.schema.yaml
      - crates/harness-adapter-runtime/src/**
    failureMeaning:
      en: Adding another language adapter would either lose useful evidence or pollute canonical results with framework-specific details.
      zh-CN: 添加另一种语言 adapter 时，要么会丢失有用证据，要么会让 canonical results 混入框架特定细节。
    review:
      approvedBy: xinyao
      approvedAt: "2026-05-25"

  - id: harness.adapter_runtime.exposes_runner_for_non_cargo_users
    feature: Adapter Runtime / Runner
    title:
      en: The adapter runtime can wrap arbitrary user test commands
      zh-CN: Adapter runtime 可以包装任意用户测试命令
    purpose:
      en: Protect real user workflows by making Cargo a development detail; installed Harness commands can run any configured test command and merge adapter events afterward.
      zh-CN: 保护真实用户工作流，让 Cargo 只是开发细节；安装后的 Harness 命令可以运行任意配置的测试命令，并在之后合并 adapter events。
    priority: P0
    boundary: integration
    lifecycle: accepted
    given:
      - en: A user invokes the runtime with a run id and a test command
        zh-CN: 用户用 run id 和 test command 调用 runtime
    when:
      - en: The test command exits
        zh-CN: test command 退出
    then:
      - en: The runtime merges adapter events into .harness/results.yaml
        zh-CN: runtime 会把 adapter events 合并到 .harness/results.yaml
      - en: When merging succeeds, the runtime exits with the underlying test command status
        zh-CN: 合并成功时，runtime 会使用底层 test command 的退出状态退出
      - en: Cargo is not part of the user-facing adapter event contract
        zh-CN: Cargo 不是面向用户的 adapter event contract 的一部分
    observes:
      - crates/harness-adapter-runtime/src/**
      - crates/harness-adapter-runtime/src/main.rs
      - harness.yaml
    failureMeaning:
      en: The Rust runtime would still feel like a Cargo-only developer tool instead of a general Harness runtime for multiple languages.
      zh-CN: Rust runtime 仍会像 Cargo-only 的开发工具，而不是支持多语言的通用 Harness runtime。
    review:
      approvedBy: xinyao
      approvedAt: "2026-05-25"
