# Canonical behavior promise for the LocalizedText language fallback chain.
apiVersion: 1
id: harness.report.falls_back_through_language_chain
feature: Seed Harness / Report
title:
  en: LocalizedText rendering falls back through a language chain
  zh-CN: LocalizedText 渲染会沿语言回退链回退
purpose:
  en: Protect bilingual review when the requested language is missing — reviewers always see meaningful text instead of an empty string.
  zh-CN: 当请求的语言缺失时，保护双语 review —— reviewer 永远能看到有意义的文本，而不是空字符串。
priority: P1
boundary: unit
lifecycle: proposed

given:
  - en: A LocalizedText value may be either a plain string or a language map
    zh-CN: 一个 LocalizedText 值可能是纯字符串，也可能是语言 map
when:
  - en: The renderer is asked to resolve a LocalizedText into a specific language
    zh-CN: renderer 被要求将一个 LocalizedText 解析成某个具体语言
then:
  - en: Plain strings are returned as-is
    zh-CN: 纯字符串原样返回
  - en: Language maps are searched in order — requested language, then its base language (e.g., `zh-CN` falls back to `zh`), then the default language (`en`)
    zh-CN: 语言 map 按顺序查找 —— 请求语言、其基础语言（如 `zh-CN` 回退到 `zh`）、默认语言（`en`）
  - en: If none of those match, the first non-blank value in the map is returned
    zh-CN: 若都不匹配，返回 map 中第一个非空值
observes:
  - packages/core/src/localized-text.ts
  - packages/core/src/report.ts

failureMeaning:
  en: A reviewer requesting a missing language sees an empty promise field and cannot tell whether the promise is blank or merely untranslated.
  zh-CN: 请求缺失语言的 reviewer 会看到空的 promise 字段，无法判断 promise 本身就是空，还是只是没翻译。

review: {}
